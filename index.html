function getCompanyInfo(company) {
  const c = company.trim().replace(/\s+/g,' ');
  if (c.includes('שלמה') || c.includes('סיקסט')) return {
    name: 'שלמה סיקסט',
    contact: '⭐ *6603',
    tire: 'החלפת צמיג: *6603 בלבד\nתקר: *6603 או גיא צמיגי געש 📱 053-7504921'
  };
  if (c.includes('הרץ')) return {
    name: 'הרץ',
    contact: '⭐ *3113',
    tire: 'החלפת צמיג: *3113 בלבד\nתקר: *3113 או גיא צמיגי געש 📱 053-7504921'
  };
  if (c.includes('ליסקאר')) return {
    name: 'ליסקאר',
    contact: 'דרום — רועי: 053-5558082\nצפון — קארן: 052-6412779\nכפר סבא — עופר: 053-4332304',
    tire: 'גיא צמיגי געש 📱 053-7504921'
  };
  return {
    name: 'נופר אנרגי',
    contact: 'דרום — רועי: 053-5558082\nצפון — קארן: 052-6412779\nכפר סבא — עופר: 053-4332304',
    tire: 'גיא צמיגי געש 📱 053-7504921'
  };
}

function lookupEmployee(text) {
  const clean = text.trim();
  // Search by plate number only
  const matches = VEHICLES.filter(v => v.plate && v.plate.includes(clean));
  if (matches.length === 0) return null;
  return matches;
}

function getTime() {
  return new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
}
document.getElementById('init-time').textContent = getTime();

function findAnswer(rawText) {
  // --- Employee lookup ---
  // Try to find employee name in message (search each word or pair of words)
  const words = rawText.trim().split(/\s+/);
  let employeeMatches = [];
  // Try full text, then pairs, then single words
  const candidates = [rawText];
  for (let i = 0; i < words.length - 1; i++) candidates.push(words[i] + ' ' + words[i+1]);
  for (const w of words) if (w.length > 2) candidates.push(w);
  for (const c of candidates) {
    const res = lookupEmployee(c);
    if (res && res.length > 0) { employeeMatches = res; break; }
  }
  if (employeeMatches.length > 0) {
    return employeeMatches.map(v => {
      const info = getCompanyInfo(v.company);
      const vehicleStr = v.make && v.model ? `${v.make} ${v.model}` : 'לא צוין';
      const plateStr = v.plate ? `מס' רכב: ${v.plate}` : '';
      const km = v.nextService && v.currentKm ? `\n🔩 טיפול הבא: ${v.nextService} ק"מ (כיום: ${v.currentKm})` : v.nextService ? `\n🔩 טיפול הבא: ${v.nextService} ק"מ` : '';
      const ins = v.insExp ? `\n🛡️ תוקף ביטוח: ${v.insExp}` : '';
      const reg = v.regExp ? `\n📋 תוקף רישוי: ${v.regExp}` : '';
      const lic = v.licenseExp ? `\n🪪 תוקף רישיון: ${v.licenseExp}` : '';
      const insp = v.inspection ? `\n🔍 ביקורת קצב"ת: ${v.inspection}` : '';
      return `👤 ${v.employee || 'לא צוין'}
🚗 ${v.make} ${v.model} (${v.year || 'שנתון לא ידוע'})
🔢 מס\' רכב: ${v.plate}
🏢 חברת ליסינג: ${info.name}
${ins}${reg}${lic}${km}${insp}

📞 לתקלה / טיפול:
${info.contact}

🔧 צמיגים:
${info.tire}`;
    }).join('\n\n---\n\n');
  }

  // --- Policy Q&A ---
  const text = rawText.toLowerCase();
  let best = null, bestScore = 0;
  for (const item of POLICY) {
    let score = 0;
    for (const kw of item.keywords) {
      if (text.includes(kw.toLowerCase())) score++;
    }
    if (score > bestScore) { bestScore = score; best = item.answer; }
  }
  if (bestScore === 0) {
    return `לא מצאתי תשובה מדויקת לשאלה זו. 🤔

💡 אפשר לחפש לפי מספר רכב — למשל: "66020804" ואני אראה את פרטי הרכב ואיך לטפל בו.

או שאל על:
• תקלה ברכב / תחזוקה
• תדלוק / טעינה חשמלית
• תאונה • החלפת צמיג
• כבישי אגרה • שטיפומט

פנייה לקצב"ת: 📱 054-2840258`;
  }
  return best;
}

function appendMessage(text, type) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = escapeHtml(text).replace(/\n/g,'<br>') +
    `<div class="message-time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'typing-indicator show'; el.id = 'typing';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  appendMessage(text, 'user');
  showTyping();
  setTimeout(() => {
    hideTyping();
    appendMessage(findAnswer(text), 'bot');
  }, 650 + Math.random()*350);
}
function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }
function focusAndHint() {
  const input = document.getElementById('userInput');
  input.placeholder = 'הכנס מספר רכב, למשל: 66020804';
  input.focus();
}
function handleKey(e) { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-hint').style.display = 'inline';
  document.getElementById('install-btn').addEventListener('click', async ev => {
    ev.preventDefault();
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById('install-hint').style.display = 'none';
  });
});
